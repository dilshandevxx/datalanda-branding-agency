<svg viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Complex Retro Balloon Filter -->
    <filter id="retro-bubble" x="-20%" y="-20%" width="140%" height="140%">
      
      <!-- 1. Bloat the font to make it bubbly and ultra-fat -->
      <feMorphology in="SourceAlpha" operator="dilate" radius="16" result="fat" />
      <feGaussianBlur in="fat" stdDeviation="7" result="blur" />
      <feComponentTransfer in="blur" result="sharp">
        <feFuncA type="linear" slope="50" intercept="-22" />
      </feComponentTransfer>
      
      <!-- Color the base dark grey/black -->
      <feFlood flood-color="#2A2A2A" result="color" />
      <feComposite in="color" in2="sharp" operator="in" result="base" />
      
      <!-- 2. Create the balloon highlight sliver (top-left) -->
      <feOffset in="sharp" dx="15" dy="15" result="shadow" />
      <feComposite in="sharp" in2="shadow" operator="out" result="sliver" />
      
      <!-- Shrink the sliver so it doesn't cover the whole edge, and round the tips -->
      <feMorphology in="sliver" operator="erode" radius="5" result="erodedSliver" />
      <feGaussianBlur in="erodedSliver" stdDeviation="2.5" result="blurSliver" />
      <feComponentTransfer in="blurSliver" result="sharpSliver">
        <feFuncA type="linear" slope="30" intercept="-12" />
      </feComponentTransfer>
      
      <!-- Color the highlight white -->
      <feFlood flood-color="#FFFFFF" result="white" />
      <feComposite in="white" in2="sharpSliver" operator="in" result="highlight" />
      
      <!-- 3. Merge base and highlight -->
      <feMerge>
        <feMergeNode in="base" />
        <feMergeNode in="highlight" />
      </feMerge>
    </filter>
  </defs>

  <!-- Retro Off-White Background -->
  <rect width="600" height="450" fill="#F4F0E6" />
  
  <!-- Thick Outer Oval -->
  <ellipse cx="300" cy="225" rx="270" ry="180" fill="none" stroke="#2A2A2A" stroke-width="16" />

  <!-- Bubbly Text with Filter Applied -->
  <!-- Using Cooper Black / Arial Black to ensure a very heavy, chunky base font -->
  <g filter="url(#retro-bubble)" font-family="'Cooper Black', 'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="115" text-anchor="middle">
    
    <!-- Top Row: SKY (Arched to fit the top of the oval) -->
    <text x="195" y="195" transform="rotate(-15 195 195)">S</text>
    <text x="300" y="165">K</text>
    <text x="405" y="195" transform="rotate(15 405 195)">Y</text>
    
    <!-- Bottom Row: LABS (Arched to fit the bottom of the oval) -->
    <text x="140" y="325" transform="rotate(-20 140 325)">L</text>
    <text x="245" y="350" transform="rotate(-7 245 350)">A</text>
    <text x="355" y="350" transform="rotate(7 355 350)">B</text>
    <text x="460" y="325" transform="rotate(20 460 325)">S</text>
  </g>
</svg>
