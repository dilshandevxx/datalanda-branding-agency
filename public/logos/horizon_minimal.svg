<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="200" fill="#F7F7F7" />
  
  <line x1="40" y1="100" x2="360" y2="100" stroke="#111111" stroke-width="4" />
  
  <!-- "SKY" on top, pushed left -->
  <text x="40" y="88" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="65" fill="#111111" text-anchor="start" letter-spacing="-3">SKY</text>
  
  <!-- "LABS" on bottom, pushed right -->
  <text x="360" y="170" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="65" fill="#111111" text-anchor="end" letter-spacing="-3">LABS</text>
  
  <!-- Accent dot -->
  <circle cx="370" cy="100" r="6" fill="#D3FF24" />
</svg>
