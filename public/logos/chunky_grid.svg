<svg viewBox="0 0 750 520" xmlns="http://www.w3.org/2000/svg">
  <!-- Warm off-white background -->
  <rect width="750" height="520" fill="#F4F0E6" />
  
  <!-- 
    Chunky Retro Grid
    Uses paint-order="stroke fill" to draw a massive black stroke BEHIND the text.
    Uses Arial Rounded or Arial Black to ensure thick, bubbly letterforms.
  -->
  <g font-family="'Arial Rounded MT Bold', 'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="180" text-anchor="middle" stroke-linejoin="round" paint-order="stroke fill">
    
    <!-- ROW 1 -->
    <!-- S (Orange) -->
    <g transform="translate(180, 250) rotate(-4)">
      <!-- Drop Shadow -->
      <text x="14" y="16" fill="#111111" stroke="#111111" stroke-width="34">S</text>
      <!-- Main Letter -->
      <text x="0" y="0" fill="#F7A332" stroke="#111111" stroke-width="34">S</text>
      <!-- Tiny Highlight -->
      <circle cx="-25" cy="-125" r="7" fill="#F4F0E6" />
    </g>
    
    <!-- K (Pink) -->
    <g transform="translate(310, 250) rotate(5)">
      <text x="14" y="16" fill="#111111" stroke="#111111" stroke-width="34">K</text>
      <text x="0" y="0" fill="#EF6C88" stroke="#111111" stroke-width="34">K</text>
      <circle cx="-35" cy="-125" r="7" fill="#F4F0E6" />
    </g>

    <!-- Y (Orange) -->
    <g transform="translate(440, 250) rotate(-6)">
      <text x="14" y="16" fill="#111111" stroke="#111111" stroke-width="34">Y</text>
      <text x="0" y="0" fill="#F7A332" stroke="#111111" stroke-width="34">Y</text>
      <circle cx="-35" cy="-125" r="7" fill="#F4F0E6" />
    </g>

    <!-- L (Pink) -->
    <g transform="translate(570, 250) rotate(4)">
      <text x="14" y="16" fill="#111111" stroke="#111111" stroke-width="34">L</text>
      <text x="0" y="0" fill="#EF6C88" stroke="#111111" stroke-width="34">L</text>
      <circle cx="-30" cy="-125" r="7" fill="#F4F0E6" />
    </g>
    
    <!-- ROW 2 -->
    <!-- A (Green) -->
    <g transform="translate(180, 410) rotate(6)">
      <text x="14" y="16" fill="#111111" stroke="#111111" stroke-width="34">A</text>
      <text x="0" y="0" fill="#369B5D" stroke="#111111" stroke-width="34">A</text>
      <circle cx="-20" cy="-125" r="7" fill="#F4F0E6" />
    </g>

    <!-- B (Blue) -->
    <g transform="translate(310, 410) rotate(-3)">
      <text x="14" y="16" fill="#111111" stroke="#111111" stroke-width="34">B</text>
      <text x="0" y="0" fill="#3D88C7" stroke="#111111" stroke-width="34">B</text>
      <circle cx="-30" cy="-125" r="7" fill="#F4F0E6" />
    </g>

    <!-- S (Green) -->
    <g transform="translate(440, 410) rotate(5)">
      <text x="14" y="16" fill="#111111" stroke="#111111" stroke-width="34">S</text>
      <text x="0" y="0" fill="#369B5D" stroke="#111111" stroke-width="34">S</text>
      <circle cx="-25" cy="-125" r="7" fill="#F4F0E6" />
    </g>

    <!-- ! (Blue) -->
    <g transform="translate(570, 410) rotate(-4)">
      <text x="14" y="16" fill="#111111" stroke="#111111" stroke-width="34">!</text>
      <text x="0" y="0" fill="#3D88C7" stroke="#111111" stroke-width="34">!</text>
      <!-- Highlight centered for the narrow exclamation mark -->
      <circle cx="0" cy="-125" r="7" fill="#F4F0E6" />
    </g>
    
  </g>
</svg>
